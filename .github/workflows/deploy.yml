name: deploy

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - ".devcontainer/**"
      - ".github/workflows/axe.yml"
      - ".github/workflows/broken-links-site.yml"
      - ".github/workflows/broken-links.yml"
      - ".github/workflows/check-external-links.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/license-year.yml"
      - ".github/workflows/lighthouse-badger.yml"
      - ".github/workflows/prettier-html.yml"
      - ".github/workflows/prettier.yml"
      - ".github/workflows/schedule-posts.txt"
      - ".github/workflows/update-citations.yml"
      - "bin/**"
      - "lighthouse_results/**"
      - ".dockerignore"
      - ".git-blame-ignore-revs"
      - .gitattributes
      - .gitignore
      - .lycheeignore
      - ".pre-commit-config.yaml"
      - ".prettierignore"
      - ".prettierrc"
      - "docker-compose.yml"
      - "Dockerfile"
      - "LICENSE"
      - "README.md"
      - "update-subtree.sh"
  pull_request:
    branches:
      - master
      - main
    paths-ignore:
      - ".devcontainer/**"
      - ".github/workflows/axe.yml"
      - ".github/workflows/broken-links-site.yml"
      - ".github/workflows/broken-links.yml"
      - ".github/workflows/check-external-links.yml"
      - ".github/workflows/codeql.yml"
      - ".github/workflows/license-year.yml"
      - ".github/workflows/lighthouse-badger.yml"
      - ".github/workflows/prettier-html.yml"
      - ".github/workflows/prettier.yml"
      - ".github/workflows/schedule-posts.txt"
      - ".github/workflows/update-citations.yml"
      - "bin/**"
      - "lighthouse_results/**"
      - ".dockerignore"
      - ".git-blame-ignore-revs"
      - .gitattributes
      - .gitignore
      - .lycheeignore
      - ".pre-commit-config.yaml"
      - ".prettierignore"
      - ".prettierrc"
      - "docker-compose.yml"
      - "Dockerfile"
      - "LICENSE"
      - "README.md"
      - "update-subtree.sh"
  schedule:
    - cron: "0 8 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true
      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip" # caching pip dependencies
      - name: Setup Node 🧰
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install JS deps 📦
        run: npm ci
      - name: Update _config.yml ⚙️
        uses: fjogeleit/yaml-update-action@main
        with:
          commitChange: false
          valueFile: "_config.yml"
          propertyPath: "giscus.repo"
          value: ${{ github.repository }}
      - name: Install and Build 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert
          export JEKYLL_ENV=production
          bundle exec jekyll build
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
